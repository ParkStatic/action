name: Parkstatic Build and Deploy
description: Build any Lovable project into a static site and deploy to Parkstatic.
author: ParkStatic

branding:
  icon: upload-cloud
  color: green

inputs:
  parkstatic-secret:
    description: Parkstatic instance secret token (store as a repository secret).
    required: true
  node-version:
    description: Node.js version used for the build.
    required: false
    default: "22"
  pnpm-version:
    description: pnpm version used for the build.
    required: false
    default: "10"
  build-command:
    description: Override the build command (skips auto-detection).
    required: false
    default: ""
  output-dir:
    description: Override the static output directory (skips auto-detection).
    required: false
    default: ""
  resolve-url:
    description: Parkstatic URL resolver endpoint.
    required: false
    default: "https://jbunbxkodmsysnfptqoj.supabase.co/functions/v1/get-instance-url"
  debug:
    description: Enable verbose shell and HTTP logging.
    required: false
    default: "false"

outputs:
  project-type:
    description: Detected Lovable project type (tanstack-start or vite-spa).
    value: ${{ steps.setup.outputs.project-type }}
  output-dir:
    description: Directory that was packaged into dist.zip.
    value: ${{ steps.build.outputs.output-dir }}
  deploy-url:
    description: Resolved deploy webhook URL, if deploy ran.
    value: ${{ steps.deploy.outputs.url }}
  deployed:
    description: Whether dist.zip was posted to the deploy webhook.
    value: ${{ steps.deploy.outputs.deployed }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v5

    - name: Detect project
      id: setup
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
      run: bash "$ACTION_PATH/scripts/detect.sh"

    - uses: pnpm/action-setup@v4
      if: steps.setup.outputs.manager == 'pnpm'
      with:
        version: ${{ inputs.pnpm-version }}

    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ steps.setup.outputs.cache }}

    - name: Install dependencies
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
        PACKAGE_MANAGER: ${{ steps.setup.outputs.manager }}
        LOCKFILE: ${{ steps.setup.outputs.lockfile }}
        PROJECT_TYPE: ${{ steps.setup.outputs.project-type }}
      run: bash "$ACTION_PATH/scripts/install.sh"

    - name: Build and package
      id: build
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
        BUILD_COMMAND: ${{ inputs.build-command }}
        OUTPUT_DIR_OVERRIDE: ${{ inputs.output-dir }}
        PACKAGE_MANAGER: ${{ steps.setup.outputs.manager }}
        PROJECT_TYPE: ${{ steps.setup.outputs.project-type }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      run: bash "$ACTION_PATH/scripts/build.sh"

    - name: Deploy to Parkstatic
      id: deploy
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
        PARKSTATIC_SECRET: ${{ inputs.parkstatic-secret }}
        RESOLVE_URL: ${{ inputs.resolve-url }}
        GH_SHA: ${{ github.sha }}
        GH_REF: ${{ github.ref }}
        GH_REPO: ${{ github.repository }}
      run: bash "$ACTION_PATH/scripts/deploy.sh"
