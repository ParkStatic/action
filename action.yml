name: Parkstatic Build and Deploy
description: Build any Lovable project into a static site and deploy to Parkstatic.
author: ParkStatic

branding:
  icon: upload-cloud
  color: green

inputs:
  parkstatic-secret:
    description: Parkstatic instance secret token (store as a repository secret).
    required: true
  node-version:
    description: Node.js version used for the build.
    required: false
    default: "22"
  pnpm-version:
    description: pnpm version used for the build.
    required: false
    default: "10"
  build-command:
    description: Override the build command (skips auto-detection).
    required: false
    default: ""
  output-dir:
    description: Override the static output directory (skips auto-detection).
    required: false
    default: ""
  prerender:
    description: Prerender the SPA to static HTML via headless Chromium.
    required: false
    default: "true"
  prerender-routes:
    description: Newline-separated extra seed paths the crawler should visit (in case they are not link-discoverable).
    required: false
    default: ""
  prerender-exclude:
    description: Newline-separated glob patterns of paths to skip (e.g. /admin/**).
    required: false
    default: ""
  prerender-max-pages:
    description: Safety cap on total prerendered pages.
    required: false
    default: "500"
  prerender-concurrency:
    description: Number of parallel page workers.
    required: false
    default: "4"
  resolve-url:
    description: Parkstatic URL resolver endpoint.
    required: false
    default: "https://jbunbxkodmsysnfptqoj.supabase.co/functions/v1/get-instance-url"
  debug:
    description: Enable verbose shell and HTTP logging.
    required: false
    default: "false"

outputs:
  output-dir:
    description: Directory that was packaged into dist.zip.
    value: ${{ steps.build.outputs.output-dir }}
  deploy-url:
    description: Resolved deploy webhook URL, if deploy ran.
    value: ${{ steps.deploy.outputs.url }}
  deployed:
    description: Whether dist.zip was posted to the deploy webhook.
    value: ${{ steps.deploy.outputs.deployed }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v5

    - name: Detect project
      id: setup
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
      run: bash "$ACTION_PATH/scripts/detect.sh"

    - uses: pnpm/action-setup@v4
      if: steps.setup.outputs.manager == 'pnpm'
      with:
        version: ${{ inputs.pnpm-version }}

    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ steps.setup.outputs.cache }}

    - name: Install dependencies
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
        PACKAGE_MANAGER: ${{ steps.setup.outputs.manager }}
        LOCKFILE: ${{ steps.setup.outputs.lockfile }}
        PRERENDER_ENABLED: ${{ inputs.prerender }}
      run: bash "$ACTION_PATH/scripts/install.sh"

    # Many Lovable projects import @tanstack/react-query but omit query-core.
    # Install it here in CI only — never committed back to the user's repo.
    - name: Ensure @tanstack/query-core
      if: steps.setup.outputs.manager == 'pnpm'
      shell: bash
      run: |
        if ! node -e "require.resolve('@tanstack/query-core')" 2>/dev/null; then
          echo "Installing @tanstack/query-core (missing in many Lovable projects)."
          pnpm add @tanstack/query-core
        fi

    - name: Build
      id: build
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
        BUILD_COMMAND: ${{ inputs.build-command }}
        OUTPUT_DIR_OVERRIDE: ${{ inputs.output-dir }}
        PACKAGE_MANAGER: ${{ steps.setup.outputs.manager }}
      run: bash "$ACTION_PATH/scripts/build.sh"

    - name: Prerender
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
        PRERENDER_ENABLED: ${{ inputs.prerender }}
        PRERENDER_ROUTES: ${{ inputs.prerender-routes }}
        PRERENDER_EXCLUDE: ${{ inputs.prerender-exclude }}
        PRERENDER_MAX_PAGES: ${{ inputs.prerender-max-pages }}
        PRERENDER_CONCURRENCY: ${{ inputs.prerender-concurrency }}
        OUTPUT_DIR: ${{ steps.build.outputs.output-dir }}
        BUILD_MODE: ${{ steps.build.outputs.mode }}
        SSR_ENTRY: ${{ steps.build.outputs.ssr-entry }}
      run: bash "$ACTION_PATH/scripts/prerender.sh"

    - name: Package
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
        OUTPUT_DIR: ${{ steps.build.outputs.output-dir }}
      run: bash "$ACTION_PATH/scripts/package.sh"

    - name: Deploy to Parkstatic
      id: deploy
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ inputs.debug }}
        PARKSTATIC_SECRET: ${{ inputs.parkstatic-secret }}
        RESOLVE_URL: ${{ inputs.resolve-url }}
        GH_SHA: ${{ github.sha }}
        GH_REF: ${{ github.ref }}
        GH_REPO: ${{ github.repository }}
      run: bash "$ACTION_PATH/scripts/deploy.sh"
