name: Parkstatic Build and Deploy
description: Build any Lovable project into a static site and deploy to Parkstatic.
author: ParkStatic

branding:
  icon: upload-cloud
  color: green

inputs:
  parkstatic-secret:
    description: Parkstatic instance secret token (store as a repository secret).
    required: true
  node-version:
    description: Node.js version used for the build.
    required: false
    default: "22"
  pnpm-version:
    description: pnpm version used for the build.
    required: false
    default: "10"
  build-command:
    description: Override the build command (skips auto-detection).
    required: false
    default: ""
  output-dir:
    description: Override the static output directory (skips auto-detection).
    required: false
    default: ""

outputs:
  deploy-url:
    description: Resolved deploy webhook URL, if deploy ran.
    value: ${{ steps.deploy.outputs.url }}
  deployed:
    description: Whether dist.zip was posted to the deploy webhook.
    value: ${{ steps.deploy.outputs.deployed }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v5

    - name: Detect package manager
      id: pm
      shell: bash
      run: |
        set -euo pipefail
        if [ -f pnpm-lock.yaml ]; then
          echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          echo "lockfile=true" >> "$GITHUB_OUTPUT"
        elif [ -f package-lock.json ]; then
          echo "manager=npm" >> "$GITHUB_OUTPUT"
          echo "lockfile=true" >> "$GITHUB_OUTPUT"
        elif [ -f yarn.lock ]; then
          echo "manager=yarn" >> "$GITHUB_OUTPUT"
          echo "lockfile=true" >> "$GITHUB_OUTPUT"
        else
          echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          echo "lockfile=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No lockfile found; using pnpm without frozen lockfile."
        fi

    - name: Detect Lovable project type
      id: project
      shell: bash
      run: |
        set -euo pipefail
        if grep -Eq '"@lovable\.dev/vite-tanstack-config"' package.json; then
          echo "type=tanstack-start" >> "$GITHUB_OUTPUT"
          echo "Detected TanStack Start project."
        elif grep -Eq '"vite"' package.json; then
          echo "type=vite-spa" >> "$GITHUB_OUTPUT"
          echo "Detected Vite SPA project."
        else
          echo "::error::Unsupported project: expected @lovable.dev/vite-tanstack-config or vite in package.json."
          exit 1
        fi

    - uses: pnpm/action-setup@v4
      if: steps.pm.outputs.manager == 'pnpm'
      with:
        version: ${{ inputs.pnpm-version }}

    - uses: actions/setup-node@v5
      if: steps.pm.outputs.lockfile == 'true' && steps.pm.outputs.manager == 'pnpm'
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - uses: actions/setup-node@v5
      if: steps.pm.outputs.lockfile == 'true' && steps.pm.outputs.manager == 'npm'
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - uses: actions/setup-node@v5
      if: steps.pm.outputs.lockfile == 'true' && steps.pm.outputs.manager == 'yarn'
      with:
        node-version: ${{ inputs.node-version }}
        cache: yarn

    - uses: actions/setup-node@v5
      if: steps.pm.outputs.lockfile != 'true'
      with:
        node-version: ${{ inputs.node-version }}

    - name: Configure package manager
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ steps.pm.outputs.manager }}" != "pnpm" ]; then
          exit 0
        fi
        {
          echo 'onlyBuiltDependencies[]=esbuild'
          echo 'onlyBuiltDependencies[]=@swc/core'
        } >> .npmrc
        if [ "${{ steps.project.outputs.type }}" = "tanstack-start" ]; then
          echo 'public-hoist-pattern[]=@tanstack/query-core' >> .npmrc
        fi

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        case "${{ steps.pm.outputs.manager }}" in
          pnpm)
            if [ "${{ steps.pm.outputs.lockfile }}" = "true" ]; then
              pnpm install --frozen-lockfile
            else
              pnpm install
            fi
            ;;
          npm)
            if [ "${{ steps.pm.outputs.lockfile }}" = "true" ]; then
              npm ci
            else
              npm install
            fi
            ;;
          yarn)
            if [ "${{ steps.pm.outputs.lockfile }}" = "true" ]; then
              yarn install --frozen-lockfile
            else
              yarn install
            fi
            ;;
        esac

    - name: Build
      shell: bash
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        BUILD_COMMAND: ${{ inputs.build-command }}
        PROJECT_TYPE: ${{ steps.project.outputs.type }}
        PACKAGE_MANAGER: ${{ steps.pm.outputs.manager }}
      run: |
        set -euo pipefail

        run_pm() {
          case "$PACKAGE_MANAGER" in
            pnpm) pnpm "$@" ;;
            npm) npm "$@" ;;
            yarn) yarn "$@" ;;
          esac
        }

        if [ -n "$BUILD_COMMAND" ]; then
          echo "Running custom build command."
          eval "$BUILD_COMMAND"
          exit 0
        fi

        if [ "$PROJECT_TYPE" = "tanstack-start" ]; then
          cat > vite.config.ci.ts << 'EOF'
        import { defineConfig } from "@lovable.dev/vite-tanstack-config";

        export default defineConfig({
          // Cloudflare plugin outputs dist/server/index.js; prerender needs server.js
          cloudflare: false,
          tanstackStart: {
            server: { entry: "server" },
            prerender: {
              enabled: true,
              autoStaticPathsDiscovery: true,
              crawlLinks: true,
            },
          },
        });
        EOF
          echo "Building TanStack Start with prerender config."
          run_pm exec vite build --config vite.config.ci.ts
        else
          echo "Building Vite SPA with project build script."
          run_pm run build
        fi

    - name: Package static site
      shell: bash
      run: |
        set -euo pipefail
        rm -rf static-site dist.zip

        OUTPUT_DIR="${{ inputs.output-dir }}"
        if [ -z "$OUTPUT_DIR" ]; then
          for candidate in dist/client dist build; do
            if [ -f "$candidate/index.html" ]; then
              OUTPUT_DIR="$candidate"
              break
            fi
          done
        fi

        if [ -z "$OUTPUT_DIR" ] || [ ! -f "$OUTPUT_DIR/index.html" ]; then
          echo "::error::Could not find static output (expected index.html in dist/client, dist, or build)."
          exit 1
        fi

        echo "Packaging static site from $OUTPUT_DIR."
        cp -a "$OUTPUT_DIR/." static-site/
        (cd static-site && zip -qr ../dist.zip .)

    - name: Deploy to Parkstatic
      id: deploy
      shell: bash
      env:
        PARKSTATIC_SECRET: ${{ inputs.parkstatic-secret }}
        GH_SHA: ${{ github.sha }}
        GH_REF: ${{ github.ref }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        if ! RESP=$(curl -sf -X POST "https://jbunbxkodmsysnfptqoj.supabase.co/functions/v1/get-instance-url" \
          -H "Authorization: Bearer $PARKSTATIC_SECRET"); then
          echo "::error::Failed to resolve Parkstatic deploy URL. Check that parkstatic-secret is valid."
          exit 1
        fi

        WEBHOOK_URL=$(echo "$RESP" | jq -er '.url')
        echo "url=$WEBHOOK_URL" >> "$GITHUB_OUTPUT"
        echo "Resolved deploy URL."

        if ! curl -sf -X POST "$WEBHOOK_URL" \
          -F "file=@dist.zip;type=application/zip" \
          -F "sha=${GH_SHA}" \
          -F "ref=${GH_REF}" \
          -F "repository=${GH_REPO}"; then
          echo "::error::Failed to upload dist.zip to Parkstatic."
          exit 1
        fi

        echo "Posted dist.zip to deploy webhook."
        echo "deployed=true" >> "$GITHUB_OUTPUT"
